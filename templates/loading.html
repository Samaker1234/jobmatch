<!DOCTYPE html>
<html lang="fr">

<head>
    <script>
        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobMatch - Intelligence Artificielle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --secondary: #a855f7;
            --secondary-glow: rgba(168, 85, 247, 0.4);
            --bg-deep: #030712;
            --text-main: #FFFFFF;
            --text-dim: rgba(255, 255, 255, 0.5);
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ambient Background */
        #neural-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.6;
        }

        .gradient-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
            animation: moveBlob 20s infinite alternate;
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
            background: radial-gradient(circle, var(--secondary-glow) 0%, transparent 70%);
            animation-delay: -5s;
        }

        @keyframes moveBlob {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 50px) scale(1.2);
            }
        }

        /* Loader Interface */
        .loader-interface {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 500px;
            width: 90%;
            padding: 20px;
        }

        .logo-container {
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
        }

        .logo-img {
            height: 80px;
            position: relative;
            z-index: 5;
            filter: drop-shadow(0 0 20px var(--primary-glow));
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            z-index: 1;
            opacity: 0.5;
            animation: logoPulse 2s infinite ease-in-out;
        }

        @keyframes logoPulse {

            0%,
            100% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        /* Scan Line Animation */
        .scanline-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
            border-radius: 50%;
            padding: 10px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .scan-core {
            font-size: 50px;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-glow);
            animation: coreRotate 4s infinite linear;
        }

        @keyframes coreRotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .scanner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 0%, var(--primary) 50%, transparent 51%);
            opacity: 0.1;
            animation: scan 3s infinite linear;
            z-index: 6;
        }

        @keyframes scan {
            0% {
                transform: translateY(-100%);
            }

            100% {
                transform: translateY(100%);
            }
        }

        /* Typography */
        .brand-text {
            font-weight: 800;
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        /* Status Console */
        .console-box {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .console-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .status-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .status-text {
            font-size: 1rem;
            font-weight: 400;
            color: #fff;
            min-height: 1.5em;
            margin-bottom: 20px;
        }

        .progress-container {
            height: 4px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 20px var(--primary-glow);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Exit Animation */
        body.exit .loader-interface {
            opacity: 0;
            transform: translateY(-20px) scale(0.98);
            filter: blur(10px);
            transition: all 0.8s cubic-bezier(0.7, 0, 0.84, 0);
        }

        @media (max-width: 480px) {
            .brand-text {
                font-size: 1.8rem;
            }

            .scanline-wrapper {
                width: 160px;
                height: 160px;
            }
        }
    </style>
</head>

<body>
    <div class="gradient-blobs">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>
    <canvas id="neural-canvas"></canvas>

    <div class="loader-interface">
        <div class="logo-container">
            <div class="logo-glow"></div>
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="JobMatch Logo" class="logo-img">
        </div>

        <div class="scanline-wrapper">
            <div class="scanner"></div>
            <div class="scan-core">
                <i class="fas fa-microchip"></i>
            </div>
        </div>

        <h1 class="brand-text">JOBMATCH</h1>
        <div class="status-badge">AI Integration System</div>

        <div class="console-box">
            <div class="status-label">
                <span>SYSTEM STATUS: PROCESSING</span>
                <span id="percent-text">0%</span>
            </div>
            <div class="status-text" id="status-content">Calcul des vecteurs...</div>
            <div class="progress-container">
                <div class="progress-bar" id="load-progress"></div>
            </div>
        </div>
    </div>

    <script>
        // Premium Neural Background
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 80;

        function init() {
            resize();
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
            animate();
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.v = 0.2 + Math.random() * 0.5;
                this.angle = Math.random() * Math.PI * 2;
                this.size = Math.random() * 1.5 + 0.5;
                this.opacity = Math.random() * 0.5;
            }

            update() {
                this.x += Math.cos(this.angle) * this.v;
                this.y += Math.sin(this.angle) * this.v;

                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(99, 102, 241, ${this.opacity})`;
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(99, 102, 241, ${(1 - dist / 120) * 0.15})`;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        init();

        // Sequence Controller
        const phases = [
            { text: "Initialisation des cores IA...", p: 15 },
            { text: "Optimisation des vecteurs de compétences...", p: 35 },
            { text: "Synchronisation avec le méta-moteur...", p: 60 },
            { text: "Calcul des scores de matching...", p: 85 },
            { text: "Lancement de l'interface premium...", p: 100 }
        ];

        let currentPhase = 0;
        const statusEl = document.getElementById('status-content');
        const progressEl = document.getElementById('load-progress');
        const percentEl = document.getElementById('percent-text');

        function updateFlow() {
            if (currentPhase < phases.length) {
                const phase = phases[currentPhase];
                statusEl.style.opacity = '0';

                setTimeout(() => {
                    statusEl.textContent = phase.text;
                    statusEl.style.opacity = '1';
                    statusEl.style.transition = 'opacity 0.3s ease';

                    progressEl.style.width = phase.p + '%';
                    percentEl.textContent = phase.p + '%';

                    currentPhase++;
                    setTimeout(updateFlow, 1500 + Math.random() * 1000);
                }, 300);
            } else {
                setTimeout(() => {
                    document.body.classList.add('exit');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 800);
                }, 500);
            }
        }

        setTimeout(updateFlow, 800);
    </script>
</body>

</html>
